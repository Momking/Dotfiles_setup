general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /home/nishant/Downloads/Wallpaper/tiger-dope-amoled-3840x2160-18370.jpg   # Update this path
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 1 # Set to 2 or 3 if you want a blur effect
}

# This is the "Ring" - we make it invisible here
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 0        # No border
    dots_size = 0.23             # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35          # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1           # Circle dots
    
    # Make the background and ring transparent
    inner_color = rgba(0, 0, 0, 0) 
    outer_color = rgba(0, 0, 0, 0)
    
    # Text color (dots will use this color)
    font_color = rgb(255, 255, 255) 
    
    fade_on_empty = true
    placeholder_text = <i></i>   # No text when empty
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center
}

# Optional: Add a clean clock instead of a ring
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}