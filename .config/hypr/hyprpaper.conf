#!/bin/bash

# Directory containing wallpapers
DIR="$HOME/.config/Wallpaper"
# Time between changes (in seconds)
INTERVAL=300

EWW_BIN="eww"
CFG="$HOME/.config/eww/"
WIDGET_WALLPAPER="wallpaper"

# 1. Start swww-daemon if not running
if ! pgrep -x "swww-daemon" > /dev/null; then
    swww-daemon &
    sleep 1
fi

# 2. Open EWW window if needed
if ! $EWW_BIN --config "$CFG" active-windows | grep -q "$WIDGET_WALLPAPER"; then
    $EWW_BIN --config "$CFG" open "$WIDGET_WALLPAPER"
fi

# Variable to track previous blurred image
PREV_BLURRED=""

while true; do
    for WALLPAPER in "$DIR"/*; do
        # Create a unique filename for the blurred version
        FILENAME=$(basename "$WALLPAPER")
        BLURRED_IMG="/tmp/${FILENAME%.*}-blurred.png"

        dms ipc call wallpaper set "$WALLPAPER"

        # Generate the blurred image if it doesn't exist
        if [ ! -f "$BLURRED_IMG" ]; then
            magick "$WALLPAPER" -blur 0x25 "$BLURRED_IMG"
        fi

        # --- UPDATE BACKGROUND ---
        # swww handles transitions smoothly
        swww img "$BLURRED_IMG" --transition-type grow --transition-pos 0.5,0.5 --transition-fps 60 --transition-step 20

        # --- UPDATE EWW WIDGET ---
        sleep 0.5
        $EWW_BIN --config "$CFG" update current_wallpaper="$WALLPAPER"

        # Cleanup old blurred image (optional, to save space in /tmp)
        if [ -n "$PREV_BLURRED" ] && [ "$PREV_BLURRED" != "$BLURRED_IMG" ]; then
            rm "$PREV_BLURRED"
        fi
        PREV_BLURRED="$BLURRED_IMG"

        matugen image "$WALLPAPER" --prefer=darkness

        sleep "$INTERVAL"
    done
done
