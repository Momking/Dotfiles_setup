[config]
reload_on_change = true

# Define the template output
[templates.btop]
input_path = '~/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'
post_hook = 'pkill -USR2 btop || true'

[templates.wofi]
input_path = "~/.config/matugen/templates/wofi.css"
output_path = "~/.config/wofi/style.css"

[templates.rofi]
input_path = "~/.config/matugen/templates/colors.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.zed]
input_path = '~/.config/matugen/templates/zed-colors.json'
output_path = '~/.config/zed/themes/matugen.json'

[templates.wlogout]
input_path = "~/.config/matugen/templates/style_template.css"
output_path = "~/.config/wlogout/style.css"

[templates.pywal]
input_path = "~/.config/matugen/templates/pywal.json"
output_path = "~/.cache/wal/colors.json"
